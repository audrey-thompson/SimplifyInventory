<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Loading…</title>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f5f5;
      color: #1a1a1a;
      min-height: 100vh;
    }

    /* ── header ── */
    header {
      background: #fff;
      border-bottom: 1px solid #e0e0e0;
      padding: 0 1.5rem;
      display: flex;
      align-items: stretch;
      gap: 0;
      overflow-x: auto;
    }

    nav {
      display: flex;
      align-items: stretch;
      gap: 0;
    }

    nav a {
      display: flex;
      align-items: center;
      padding: 1rem 0.9rem;
      color: #555;
      text-decoration: none;
      font-size: 0.85rem;
      white-space: nowrap;
      border-bottom: 2px solid transparent;
      transition: color 0.15s, border-color 0.15s;
    }

    nav a:hover {
      color: #1a1a1a;
    }

    nav a.active {
      color: #1a56db;
      border-bottom-color: #1a56db;
      font-weight: 600;
    }

    /* ── main content ── */
    main {
      max-width: 820px;
      margin: 2rem auto;
      padding: 0 1rem;
      display: flex;
      flex-direction: column;
      gap: 1.75rem;
    }

    /* ── video ── */
    .video-wrap {
      background: #000;
      border-radius: 10px;
      overflow: hidden;
      aspect-ratio: 16 / 9;
    }

    .video-wrap video {
      width: 100%;
      height: 100%;
      display: block;
    }

    .video-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #555;
      font-size: 0.9rem;
      background: #1a1a1a;
    }

    /* ── markdown ── */
    .md-body {
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 10px;
      padding: 1.75rem 2rem;
      line-height: 1.7;
    }

    .md-body h1,
    .md-body h2,
    .md-body h3 {
      margin-top: 1.5em;
      margin-bottom: 0.5em;
      font-weight: 600;
    }

    .md-body h1:first-child,
    .md-body h2:first-child,
    .md-body h3:first-child {
      margin-top: 0;
    }

    .md-body p {
      margin-bottom: 1em;
    }

    .md-body p:last-child {
      margin-bottom: 0;
    }

    .md-body ul,
    .md-body ol {
      padding-left: 1.5em;
      margin-bottom: 1em;
    }

    .md-body li {
      margin-bottom: 0.25em;
    }

    .md-body code {
      background: #f0f0f0;
      padding: 0.1em 0.35em;
      border-radius: 4px;
      font-size: 0.88em;
    }

    .md-body pre {
      background: #f0f0f0;
      padding: 1em;
      border-radius: 6px;
      overflow-x: auto;
      margin-bottom: 1em;
    }

    .md-body pre code {
      background: none;
      padding: 0;
    }

    .md-body blockquote {
      border-left: 3px solid #1a56db;
      padding-left: 1em;
      color: #555;
      margin-bottom: 1em;
    }

    .md-body a {
      color: #1a56db;
    }

    /* ── prev/next navigation ── */
    .page-nav {
      display: flex;
      justify-content: space-between;
      gap: 1rem;
      padding-bottom: 2rem;
    }

    .page-nav a {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      padding: 0.75rem 1.1rem;
      text-decoration: none;
      color: #1a1a1a;
      font-size: 0.875rem;
      transition: border-color 0.15s, box-shadow 0.15s;
      max-width: 48%;
    }

    .page-nav a:hover {
      border-color: #1a56db;
      box-shadow: 0 0 0 2px #e0eaff;
    }

    .page-nav a.hidden {
      visibility: hidden;
    }

    .page-nav .nav-label {
      color: #888;
      font-size: 0.75rem;
      display: block;
    }

    .page-nav .nav-title {
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .page-nav .prev {
      flex-direction: row;
    }

    .page-nav .next {
      flex-direction: row-reverse;
      margin-left: auto;
      text-align: right;
    }

    .page-nav .arrow {
      font-size: 1.1rem;
      color: #888;
      flex-shrink: 0;
    }

    .error {
      color: #c00;
      font-size: 0.9rem;
    }
  </style>
</head>

<body>

  <header>
    <nav id="toc"></nav>
  </header>

  <main>
    <div class="video-wrap" id="video-wrap"></div>
    <div class="md-body" id="md-body">Loading content…</div>
    <div class="page-nav" id="page-nav"></div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
  <script src="config.js"></script>
  <script>
    const params = new URLSearchParams(location.search);
    const raw = parseInt(params.get("p"), 10);
    const idx = isNaN(raw) ? 0 : raw - 1;

    const toc = document.getElementById("toc");
    PAGES.forEach((p, i) => {
      const a = document.createElement("a");
      a.href = `?p=${i + 1}`;
      a.textContent = p.title;
      if (i === idx) a.className = "active";
      toc.appendChild(a);
    });

    if (idx < 0 || idx >= PAGES.length) {
      document.getElementById("video-wrap").innerHTML = "";
      document.getElementById("md-body").textContent = "No page at this URL.";
    } else {
      const page = PAGES[idx];

      document.title = page.title;

      const vw = document.getElementById("video-wrap");
      if (page.video) {
        vw.innerHTML = `<video controls preload="metadata"><source src="${page.video}" type="video/mp4">Your browser does not support video.</video>`;
      } else {
        vw.innerHTML = `<div class="video-placeholder">Video coming soon</div>`;
      }

      fetch(page.content)
        .then(r => {
          if (!r.ok) throw new Error(`${r.status} ${r.statusText}`);
          return r.text();
        })
        .then(md => {
          document.getElementById("md-body").innerHTML = marked.parse(md);
        })
        .catch(err => {
          document.getElementById("md-body").innerHTML =
            `<p class="error">Could not load content: ${err.message}</p>`;
        });

      const nav = document.getElementById("page-nav");
      const prev = idx > 0 ? PAGES[idx - 1] : null;
      const next = idx < PAGES.length - 1 ? PAGES[idx + 1] : null;

      nav.innerHTML = `
        ${prev
          ? `<a class="prev" href="?p=${idx}">
               <span class="arrow">←</span>
               <span><span class="nav-label">Previous</span><span class="nav-title">${prev.title}</span></span>
             </a>`
          : `<span></span>`}
        ${next
          ? `<a class="next" href="?p=${idx + 2}">
               <span><span class="nav-label">Next</span><span class="nav-title">${next.title}</span></span>
               <span class="arrow">→</span>
             </a>`
          : `<span></span>`}
      `;
    }
  </script>

</body>

</html>
